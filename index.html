<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать в Японию</title>
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Секция карты (Hero) -->
    <section class="hero-map">
        <!-- Здесь в будущем будет инициализирован Three.js canvas -->
        <canvas id="japan-3d-map"></canvas>
        
        <div class="map-overlay">
            <h1 class="title">Добро пожаловать в Японию</h1>
            <p class="subtitle">
                Страна восходящего солнца и новых возможностей.<br>
                Мир, где родились герои чести, и страна, подарившая нам аниме и мангу.
            </p>
            
            <!-- Центральная точка на карте для старта -->
            <a href="#" class="glow-point-wrapper">
                <div class="glow-point" title="Начать"></div>
                <div class="point-label">Начать путешествие</div>
            </a>
        </div>
    </section>

</body>
</html>
