<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Микото — Вход и Регистрация</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1542931287-023b922fa89b?q=80&w=2000&auto=format&fit=crop') center/cover;
            position: relative;
        }
        .auth-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            z-index: 1;
        }
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 450px;
            z-index: 2;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--glass-border);
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-size: 18px;
            font-family: var(--font-jp);
            color: var(--text-muted);
            transition: var(--transition);
        }
        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        .form-group input {
            width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border); border-radius: var(--radius-md);
            color: #fff; outline: none; transition: var(--transition);
        }
        .form-group input:focus { border-color: var(--primary); }
        .auth-btn { width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
        
        .auth-form { display: none; animation: fadeIn 0.4s; }
        .auth-form.active { display: block; }

        .auth-error {
            color: #EF4444; font-size: 14px; text-align: center; margin-bottom: 16px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card animate-fade-in">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 20px;">
                <i class="fa-solid fa-torii-gate"></i> Микото<span>.</span>
            </a>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchAuth('login')">Вход</div>
                <div class="auth-tab" id="tab-register" onclick="switchAuth('register')">Регистрация</div>
            </div>

            <div id="auth-error-msg" class="auth-error"></div>

            <!-- Форма Входа -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary auth-btn">Войти в аккаунт</button>
            </form>

            <!-- Форма Регистрации -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="reg-username" placeholder="NinjaTraveler" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary auth-btn">Создать аккаунт</button>
            </form>

        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Auto-redirect if already logged in
        if(MIKOTO_STATE.user && MIKOTO_STATE.user.username) {
            window.location.href = 'profile.html';
        }

        function switchAuth(mode) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('auth-error-msg').innerText = '';
            
            document.getElementById('tab-' + mode).classList.add('active');
            document.getElementById(mode + '-form').classList.add('active');
        }
    </script>
</body>
</html>
